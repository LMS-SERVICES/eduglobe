services:
  eduglobe-app:
    container_name: eduglobe-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    networks:
      - eduglobe-network

networks:
  eduglobe-network:
    driver: bridge
